- hosts: myhost
  connection: local
  become: false

  tasks:
    - name: Pull Docker Image
      command: docker pull rohitbansal2113/calculator-app

    - name: Remove old container
      command: docker rm -f calculator-container
      ignore_errors: yes

    - name: Run Docker Container
      command: docker run -it --name calculator-container rohitbansal2113/calculator-app

